<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FirmaES — Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--navy2:#112240;--navy3:#1a3050;
  --gold:#c9a227;--gold2:#e8c45a;
  --cream:#f5f0e8;--cream2:#ede8dc;
  --green:#16a34a;--red:#dc2626;--warn:#d97706;
  --muted:#6b7280;--border:rgba(255,255,255,.08);--gborder:rgba(201,162,39,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--navy2);border-bottom:1px solid var(--gborder);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600}
.logo span{color:var(--gold)}
.logo sub{font-size:.6rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;vertical-align:super;margin-left:.3rem}
.topbar-right{display:flex;gap:.7rem;align-items:center}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.42rem .9rem;border-radius:2px;border:none;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-gold:hover:not(:disabled){background:var(--gold2)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--cream);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.12)}
.btn-green{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.btn-green:hover:not(:disabled){background:rgba(22,163,74,.25)}
.btn-red{background:rgba(220,38,38,.12);color:#fca5a5;border:1px solid rgba(220,38,38,.2)}
.btn-red:hover:not(:disabled){background:rgba(220,38,38,.22)}
.btn-warn{background:rgba(217,119,6,.12);color:#fcd34d;border:1px solid rgba(217,119,6,.2)}
.btn-sm{padding:.28rem .6rem;font-size:.7rem}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:2rem}
.login-card{background:var(--navy2);border:1px solid var(--gborder);border-radius:4px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.login-card h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:.4rem}
.login-card p{font-size:.82rem;color:var(--muted);margin-bottom:1.8rem}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:.6rem .8rem;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--cream);outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:rgba(201,162,39,.5)}
.inp::placeholder{color:rgba(245,240,232,.25)}

/* LAYOUT */
#adminScreen{display:none}
.layout{display:flex;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--border);padding:1rem 0;display:flex;flex-direction:column;gap:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sb-section{padding:.4rem .8rem .2rem;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,162,39,.5);font-weight:500;margin-top:.5rem}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;font-size:.8rem;color:rgba(245,240,232,.6);cursor:pointer;transition:all .2s;border-left:2px solid transparent}
.sb-item:hover{color:var(--cream);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--cream);border-left-color:var(--gold);background:rgba(201,162,39,.06)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-count{margin-left:auto;font-size:.65rem;background:rgba(255,255,255,.08);padding:.1rem .4rem;border-radius:10px;color:var(--muted)}

/* CONTENT */
.content{flex:1;padding:1.5rem;overflow-y:auto;max-width:900px}

/* CLASS CARD */
.class-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.class-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300}
.class-title span{color:var(--gold)}
.badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;padding:.2rem .6rem;border-radius:2px;font-weight:500}
.badge-active{background:rgba(22,163,74,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.badge-inactive{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.badge-done{background:rgba(201,162,39,.1);color:var(--gold2);border:1px solid var(--gborder)}

/* SECTIONS */
.section{background:var(--navy2);border:1px solid var(--border);border-radius:3px;margin-bottom:1rem}
.section-head{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,162,39,.65);font-weight:500}
.section-body{padding:1.1rem}

/* PDF ZONE */
.pdf-zone{border:2px dashed var(--gborder);border-radius:3px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .3s}
.pdf-zone:hover,.pdf-zone.drag{border-color:var(--gold);background:rgba(201,162,39,.04)}
.pdf-loaded{background:rgba(22,163,74,.06);border:1px solid rgba(74,222,128,.2);border-radius:2px;padding:.6rem 1rem;font-size:.8rem;color:#4ade80;display:flex;align-items:center;gap:.6rem}

/* SIGNERS */
.signers-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.8rem}
.signer-row{display:flex;align-items:center;gap:.7rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:2px;padding:.55rem .8rem;transition:all .2s}
.signer-row.current{border-color:var(--gold);background:rgba(201,162,39,.05)}
.signer-row.signed{opacity:.7}
.drag-handle{color:rgba(255,255,255,.2);cursor:grab;font-size:.9rem;padding:0 .2rem}
.drag-handle:active{cursor:grabbing}
.signer-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;background:rgba(255,255,255,.08);color:var(--muted)}
.signer-num.current{background:var(--gold);color:var(--navy)}
.signer-num.done{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.signer-name{flex:1;font-size:.84rem}
.signer-status{font-size:.7rem;color:var(--muted)}
.signer-status.done{color:#4ade80}
.signer-status.current{color:var(--gold)}

.add-signer{display:flex;gap:.5rem}

/* PROGRESS */
.prog-wrap{margin-bottom:1rem}
.prog-bg{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .5s}
.prog-label{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:.35rem}

/* LINKS TABLE */
.links-table{width:100%;border-collapse:collapse;font-size:.78rem}
.links-table th{text-align:left;padding:.5rem .7rem;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.links-table td{padding:.55rem .7rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.links-table tr:last-child td{border-bottom:none}
.link-url{font-family:monospace;font-size:.68rem;color:rgba(245,240,232,.35);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy2);border:1px solid var(--gborder);color:var(--cream);padding:.65rem 1.4rem;border-radius:3px;font-size:.8rem;z-index:999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.35)}
.toast.err{border-color:rgba(220,38,38,.35);color:#fca5a5}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Firma<span>ES</span> <sub>ADMIN</sub></div>
  <div class="topbar-right">
    <a href="/index.html" target="_blank" class="btn btn-ghost btn-sm">👁 Vista pública</a>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sortir</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Accés administrador</h2>
    <p>Introdueix la contrasenya per gestionar els cursos</p>
    <input class="inp" type="password" id="passInp" placeholder="Contrasenya" style="margin-bottom:.8rem" onkeydown="if(e.key==='Enter')login()">
    <button class="btn btn-gold" style="width:100%" onclick="login()">Entrar →</button>
    <div id="loginErr" style="font-size:.75rem;color:#fca5a5;margin-top:.7rem;display:none"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div style="color:var(--muted);font-size:.85rem;padding:3rem;text-align:center">
        Selecciona una classe al menú esquerre
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
const API = '';
let adminToken = '';
let courses = {};
let activeClassKey = null;
let dragSrc = null;

// ── AUTH ─────────────────────────────────────────────────────
async function login() {
  const pass = document.getElementById('passInp').value;
  try {
    const r = await fetch(`${API}/api/admin/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:pass})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    adminToken = d.token;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    await loadCourses();
  } catch(e) {
    const el = document.getElementById('loginErr');
    el.style.display = 'block';
    el.textContent = e.message || 'Contrasenya incorrecta';
  }
}

document.getElementById('passInp').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

function logout() {
  adminToken = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('passInp').value = '';
}

function headers() { return {'x-admin-token': adminToken, 'Content-Type':'application/json'}; }
function headersNoJson() { return {'x-admin-token': adminToken}; }

// ── LOAD DATA ────────────────────────────────────────────────
async function loadCourses() {
  const r = await fetch(`${API}/api/admin/classes`, {headers: headersNoJson()});
  const d = await r.json();
  courses = d.courses;
  renderSidebar();
  if (activeClassKey) renderClass(activeClassKey);
}

// ── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  for (const [courseId, course] of Object.entries(courses)) {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'sb-section';
    sectionEl.textContent = course.name;
    sb.appendChild(sectionEl);

    for (const cls of course.classes) {
      const key = cls.classKey;
      const signed = cls.signers.filter(s=>s.status==='signed').length;
      const total = cls.signers.length;
      const color = cls.active && total > 0 && signed === total ? '#4ade80'
                  : cls.active ? 'var(--gold)'
                  : 'rgba(255,255,255,.15)';

      const item = document.createElement('div');
      item.className = `sb-item${key === activeClassKey ? ' active' : ''}`;
      item.innerHTML = `
        <div class="sb-dot" style="background:${color}"></div>
        <span>${cls.className}</span>
        ${total > 0 ? `<span class="sb-count">${signed}/${total}</span>` : ''}
      `;
      item.onclick = () => { activeClassKey = key; renderSidebar(); renderClass(key); };
      sb.appendChild(item);
    }
  }
}

// ── CLASS VIEW ───────────────────────────────────────────────
function getClassData(key) {
  for (const course of Object.values(courses)) {
    const cls = course.classes.find(c => c.classKey === key);
    if (cls) return cls;
  }
  return null;
}

async function renderClass(key) {
  const cls = getClassData(key);
  if (!cls) return;

  const signed = cls.signers.filter(s=>s.status==='signed').length;
  const total  = cls.signers.length;
  const pct    = total===0 ? 0 : Math.round(signed/total*100);
  const currentIdx = cls.signers.findIndex(s=>s.status==='pending');
  const allDone = total > 0 && signed === total;

  const content = document.getElementById('content');
  content.innerHTML = `
    <!-- HEADER -->
    <div class="class-header">
      <div class="class-title">${cls.courseName} — <span>${cls.className}</span></div>
      <span class="badge ${cls.active && allDone ? 'badge-done' : cls.active ? 'badge-active' : 'badge-inactive'}">
        ${cls.active && allDone ? '✅ Completat' : cls.active ? '● Actiu' : '○ Inactiu'}
      </span>
    </div>

    <!-- PROGRESS -->
    ${total > 0 ? `
    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-label"><span>${signed} de ${total} signatures</span><span>${pct}%</span></div>
    </div>` : ''}

    <!-- PDF -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">Document PDF</div>
        <button class="btn btn-ghost btn-sm" onclick="uploadPdf('${key}')">+ Canviar PDF</button>
      </div>
      <div class="section-body">
        ${cls.pdfName
          ? `<div class="pdf-loaded">📄 ${esc(cls.pdfName)} <span style="color:var(--muted);margin-left:auto;font-size:.7rem">v${cls.pdfVersion}</span>
             <a href="/api/pdf/${key}" target="_blank" class="btn btn-ghost btn-sm">⬇ Descarregar</a></div>`
          : `<div class="pdf-zone" onclick="uploadPdf('${key}')" id="pdfZone-${key}">
               <div style="font-size:2rem;margin-bottom:.5rem">📄</div>
               <div style="font-size:.85rem;color:var(--muted)">Fes clic per pujar el PDF d'aquesta classe</div>
             </div>`
        }
      </div>
    </div>

    <!-- SIGNATARIS -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">Signataris (ordre de firma)</div>
      </div>
      <div class="section-body">
        <div class="signers-list" id="signersList-${key}">
          ${cls.signers.map((s,i) => signerRowHtml(s, i, i===currentIdx, key)).join('') || 
            '<div style="font-size:.78rem;color:var(--muted);padding:.3rem 0">Cap signatari afegit</div>'}
        </div>
        <div class="add-signer">
          <input class="inp" id="newSignerName-${key}" placeholder="Nom del signatari" style="flex:1"
            onkeydown="if(event.key==='Enter')addSigner('${key}')">
          <button class="btn btn-gold" onclick="addSigner('${key}')">+ Afegir</button>
        </div>
      </div>
    </div>

    <!-- ACCIONS -->
    <div class="section">
      <div class="section-head"><div class="section-title">Accions</div></div>
      <div class="section-body" style="display:flex;gap:.7rem;flex-wrap:wrap">
        <button class="btn ${cls.active ? 'btn-warn' : 'btn-green'}" onclick="toggleActive('${key}')">
          ${cls.active ? '⏸ Desactivar procés' : '▶ Activar procés de firma'}
        </button>
        ${cls.active ? `<button class="btn btn-ghost" onclick="showLinks('${key}')">🔗 Veure enllaços</button>` : ''}
        <button class="btn btn-red" onclick="resetClass('${key}')">🔄 Reiniciar</button>
      </div>
    </div>

    <!-- LINKS (hidden by default) -->
    <div class="section" id="linksSection-${key}" style="display:none">
      <div class="section-head">
        <div class="section-title">Enllaços per a cada signatari</div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('linksSection-${key}').style.display='none'">✕</button>
      </div>
      <div class="section-body" id="linksBody-${key}">
        <div class="spin" style="display:block;margin:1rem auto"></div>
      </div>
    </div>
  `;

  // Drag & drop per reordenar
  setupDragDrop(key);
}

function signerRowHtml(s, i, isCurrent, key) {
  const done = s.status === 'signed';
  return `
  <div class="signer-row ${isCurrent?'current':''} ${done?'signed':''}" 
       draggable="true" data-id="${s.id}" data-key="${key}">
    <span class="drag-handle" title="Arrossega per canviar ordre">⠿</span>
    <div class="signer-num ${isCurrent?'current':''} ${done?'done':''}">${done?'✓':i+1}</div>
    <div class="signer-name">${esc(s.name)}</div>
    <div class="signer-status ${done?'done':isCurrent?'current':''}">
      ${done ? `✓ ${formatDate(s.signedAt)}` : isCurrent ? '👆 Torn actual' : 'En espera'}
    </div>
    ${!done ? `<button class="btn btn-red btn-sm" onclick="deleteSigner('${key}','${s.id}')">✕</button>` : ''}
  </div>`;
}

// ── DRAG & DROP REORDER ──────────────────────────────────────
function setupDragDrop(key) {
  const list = document.getElementById(`signersList-${key}`);
  if (!list) return;
  list.addEventListener('dragstart', e => {
    dragSrc = e.target.closest('.signer-row');
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(()=>dragSrc?.classList.add('dragging'),0);
  });
  list.addEventListener('dragend', e => {
    document.querySelectorAll('.signer-row').forEach(r=>r.classList.remove('dragging','drag-over'));
    saveOrder(key);
  });
  list.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.signer-row');
    if (!target || target === dragSrc) return;
    document.querySelectorAll('.signer-row').forEach(r=>r.classList.remove('drag-over'));
    target.classList.add('drag-over');
    const rect = target.getBoundingClientRect();
    const mid  = rect.top + rect.height/2;
    if (e.clientY < mid) list.insertBefore(dragSrc, target);
    else list.insertBefore(dragSrc, target.nextSibling);
  });
}

async function saveOrder(key) {
  const list = document.getElementById(`signersList-${key}`);
  if (!list) return;
  const order = [...list.querySelectorAll('.signer-row')].map(r => r.dataset.id);
  await fetch(`${API}/api/admin/classes/${key}/signers/order`, {
    method:'PUT', headers: headers(),
    body: JSON.stringify({order})
  });
  await loadCourses();
}

// ── ACCIONS ──────────────────────────────────────────────────
function uploadPdf(key) {
  // Elimina qualsevol input anterior
  const old = document.getElementById('pdfFile');
  if (old) old.remove();

  // Crea un input nou cada vegada (evita problemes de navegador)
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.id   = 'pdfFile';
  inp.accept = '.pdf,application/pdf';
  inp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(inp);

  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
      showToast('Només arxius PDF','err'); return;
    }
    const fd = new FormData();
    fd.append('pdf', file);
    showToast('Pujant PDF...');
    try {
      const r = await fetch(`${API}/api/admin/classes/${key}/pdf`, {
        method:'POST', headers:headersNoJson(), body:fd
      });
      const d = await r.json();
      if (!r.ok) { showToast(d.error || 'Error pujant','err'); return; }
      showToast('PDF pujat correctament ✓','ok');
      await loadCourses();
      renderClass(key);
    } catch(e) {
      showToast('Error de connexió','err');
    } finally {
      inp.remove();
    }
  });

  // Dispara el diàleg de fitxers
  inp.click();
}

async function addSigner(key) {
  const inp = document.getElementById(`newSignerName-${key}`);
  const name = inp?.value.trim();
  if (!name) { showToast('Escriu un nom','err'); return; }

  const r = await fetch(`${API}/api/admin/classes/${key}/signers`, {
    method:'POST', headers:headers(), body:JSON.stringify({name})
  });
  const d = await r.json();
  if (!r.ok) { showToast(d.error,'err'); return; }
  showToast(`${name} afegit`,'ok');
  await loadCourses(); renderClass(key);
}

async function deleteSigner(key, id) {
  if (!confirm('Eliminar aquest signatari?')) return;
  const r = await fetch(`${API}/api/admin/classes/${key}/signers/${id}`, {
    method:'DELETE', headers:headersNoJson()
  });
  const d = await r.json();
  if (!r.ok) { showToast(d.error,'err'); return; }
  showToast('Eliminat','ok');
  await loadCourses(); renderClass(key);
}

async function toggleActive(key) {
  const cls = getClassData(key);
  if (!cls.active && !cls.pdfName) { showToast('Primer puja un PDF','err'); return; }
  if (!cls.active && cls.signers.length===0) { showToast('Primer afegeix signataris','err'); return; }
  if (cls.active && !confirm('Desactivar el procés? Es perdrà el progrés actual.')) return;

  const r = await fetch(`${API}/api/admin/classes/${key}/activate`, {
    method:'POST', headers:headersNoJson()
  });
  const d = await r.json();
  if (!r.ok) { showToast(d.error,'err'); return; }
  showToast(d.active ? 'Procés activat ✓' : 'Procés desactivat','ok');
  await loadCourses(); renderClass(key);
}

async function resetClass(key) {
  if (!confirm('Reiniciar totes les signatures? El PDF es conserva però les firmes es perden.')) return;
  const r = await fetch(`${API}/api/admin/classes/${key}/reset`, {
    method:'POST', headers:headersNoJson()
  });
  const d = await r.json();
  if (!r.ok) { showToast(d.error,'err'); return; }
  showToast('Reiniciat','ok');
  await loadCourses(); renderClass(key);
}

async function showLinks(key) {
  const sec  = document.getElementById(`linksSection-${key}`);
  const body = document.getElementById(`linksBody-${key}`);
  sec.style.display = 'block';
  sec.scrollIntoView({behavior:'smooth', block:'nearest'});

  const r = await fetch(`${API}/api/admin/classes/${key}/links`, {headers:headersNoJson()});
  const d = await r.json();
  if (!r.ok) { body.innerHTML = `<span style="color:#fca5a5">${d.error}</span>`; return; }

  body.innerHTML = `
    <p style="font-size:.75rem;color:var(--muted);margin-bottom:.8rem">
      Comparteix l'enllaç corresponent amb cada persona. Cada un és únic i intransferible.
    </p>
    <table class="links-table">
      <thead><tr><th>#</th><th>Nom</th><th>Estat</th><th>Enllaç</th><th></th></tr></thead>
      <tbody>
        ${d.links.map((l,i) => `
          <tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td>${esc(l.name)}</td>
            <td><span class="badge ${l.status==='signed'?'badge-active':'badge-inactive'}">${l.status==='signed'?'✓ Signat':'Pendent'}</span></td>
            <td><div class="link-url" title="${esc(l.url)}">${esc(l.url)}</div></td>
            <td><button class="btn btn-ghost btn-sm" onclick="copyLink('${esc(l.url)}')">Copiar</button></td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:.8rem;display:flex;gap:.5rem">
      <button class="btn btn-ghost btn-sm" onclick="copyAllLinks(${JSON.stringify(d.links).replace(/"/g,'&quot;')})">📋 Copiar tots</button>
    </div>
  `;
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(()=>showToast('Copiat!','ok'));
}

function copyAllLinks(links) {
  const text = links.map(l => `${l.name}: ${l.url}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast('Tots els enllaços copiats!','ok'));
}

// ── HELPERS ──────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso){ if(!iso)return''; return new Date(iso).toLocaleDateString('ca-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
let toastTid;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show${type?' '+type:''}`;
  clearTimeout(toastTid); toastTid=setTimeout(()=>t.classList.remove('show'),3000);
}

// Auto-refresca cada 15s
setInterval(async()=>{ if(adminToken){ await loadCourses(); if(activeClassKey) renderClass(activeClassKey); } }, 15000);
</script>
</body>
</html>
